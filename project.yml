name: HermesMacOS
options:
  developmentLanguage: en
  knownRegions: [en, fr, es, de, zh-Hans, Base]
  bundleIdPrefix: fr.dubertrand
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
    MACOSX_DEPLOYMENT_TARGET: 26.0
targets:
  HermesMacOS:
    type: application
    platform: macOS
    sources:
      - path: HermesMacOS
        excludes:
          - Resources/HermesLogoDark.png
          - Resources/HermesLogoLight.png
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.dubertrand.HermesMacOS
        PRODUCT_NAME: HermesMacOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY[sdk=macosx*]: Apple Development
        CODE_SIGN_ENTITLEMENTS: HermesMacOS/HermesMacOS.entitlements
        DEVELOPMENT_TEAM: RJYVGK9S3F
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Hermes on MacOS"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Laurent Dubertrand"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "HermesMacOS uses the microphone to dictate prompts into Ask Hermes."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "HermesMacOS can transcribe your speech into Ask Hermes prompts."
